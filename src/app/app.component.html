<ion-app>
  <ion-split-pane contentId="main-content">

    <ion-menu contentId="main-content" side="end" type="overlay" [disabled]="!isLoggedIn">
      <ion-content>

        <div style="text-align: center; padding: 20px;">
          <img src="assets/images/image-2.png" alt="Logo" style="max-width: 120px;">
        </div>

        <ion-list id="inbox-list">

          <ion-menu-toggle auto-hide="false" *ngFor="let p of appPages">
            <ion-item [routerLink]="[p.url]" routerDirection="root">
           
              <ion-label>{{ p.title | translate }}</ion-label>
              <ion-icon slot="end" [name]="p.icon"></ion-icon>
            </ion-item>
          </ion-menu-toggle>

          <ion-item button (click)="logout()">
            <ion-label>{{ 'MENU.LOGOUT' | translate }}</ion-label>
            <ion-icon slot="end" name="log-out-outline"></ion-icon>
          </ion-item>

        </ion-list>

      </ion-content>
    </ion-menu>

    <ion-router-outlet id="main-content"></ion-router-outlet>

  </ion-split-pane>
</ion-app>
