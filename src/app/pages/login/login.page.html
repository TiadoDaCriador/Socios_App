<ion-content class="login-content">
  <div class="login-bg">
    <div class="login-card">

      <div class="login-header">
        <img src="assets/images/Group 1 (3).png" class="login-logo" alt="Maestro" />
      </div>

      <div class="login-form">
        <div class="field-group">
          <div class="field-wrap">
            <input class="field-input" type="text" inputmode="numeric" maxlength="9" placeholder="NIF" [(ngModel)]="nif"
              (keyup.enter)="entrar()" />
          </div>
        </div>
        <div class="field-group">
          <div class="field-wrap" [class.field-filled]="password.length > 0">
            <input class="field-input" [type]="mostrarPassword ? 'text' : 'password'" placeholder="••••••••"
              [(ngModel)]="password" (keyup.enter)="entrar()" />
            <button class="field-eye" (click)="mostrarPassword = !mostrarPassword" type="button">
              <ion-icon [name]="mostrarPassword ? 'eye-outline' : 'eye-off-outline'"></ion-icon>
            </button>
          </div>
        </div>

        <button class="btn-entrar" (click)="entrar()" [disabled]="carregando">
          <span *ngIf="!carregando">{{ 'ENTRAR' | translate }}</span>
          <span *ngIf="carregando" class="spinner"></span>
        </button>

        <button class="btn-recuperar" type="button">
          {{ 'LOGIN.RECUPERAR' | translate }}
        </button>
      </div>

      <div class="login-footer">
        <span class="footer-dev">Desenvolvido por:</span>
        <div class="footer-logos">
          <img src="assets/images/a_musa.png" class="footer-logo" alt="a_musa" />
          <img src="assets/images/Amadeus.png" class="footer-logo" alt="Amadeus" />
        </div>
        <p class="footer-install">
          Para instalar em Android visualize <a href="#">aqui</a>, ou iOS visualize <a href="#">aqui</a>
        </p>
        <p class="footer-registo">
          Não tem conta? <button class="btn-link" (click)="irParaRegisto()">Registe-se aqui</button>
        </p>
      </div>

    </div>
  </div>
</ion-content>
