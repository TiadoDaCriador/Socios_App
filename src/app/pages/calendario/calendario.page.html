<!-- src/app/pages/calendario/calendario.page.html -->
<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="end">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>Calendário</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="cal-content">

  <!-- Barra de vistas -->
  <div class="vista-bar">
    <button class="vista-btn" [class.active]="vista === 'mes'" (click)="setVista('mes')">MÊS</button>
    <button class="vista-btn" [class.active]="vista === 'semana'" (click)="setVista('semana')">SEMANA</button>
    <button class="vista-btn" [class.active]="vista === 'dia'" (click)="setVista('dia')">DIA</button>
  </div>

  <!-- Navegação -->
  <div class="nav-bar">
    <button class="nav-btn today-btn" (click)="irParaHoje()">HOJE</button>
    <button class="nav-btn arrow-btn" (click)="anterior()">
      <ion-icon name="chevron-back-outline"></ion-icon>
    </button>
    <button class="nav-btn arrow-btn" (click)="proximo()">
      <ion-icon name="chevron-forward-outline"></ion-icon>
    </button>
    <span class="nav-titulo">{{ tituloNavegacao }}</span>
  </div>

  <!-- ══ VISTA MÊS ══ -->
  <div class="cal-mes" *ngIf="vista === 'mes'">
    <div class="mes-header">
      <div class="mes-header-dia" *ngFor="let d of diasSemana">{{ d }}</div>
    </div>
    <div class="mes-grid">
      <div class="mes-celula"
        *ngFor="let celula of celulas"
        [class.outro-mes]="!celula.mesAtual"
        [class.hoje]="isHoje(celula.data)"
        [class.passado]="isPassado(celula.data)"
        (click)="!isPassado(celula.data) && abrirModalNovoEvento(celula.data)">

        <span class="celula-num">{{ celula.data.getDate() }}</span>

        <div class="celula-eventos">
          <div class="evento-pill"
            *ngFor="let ev of eventosNoDia(celula.data)"
            [ngClass]="'cor-' + ev.cor"
            (click)="abrirModalEditar(ev, $event)">
            {{ ev.hora }}
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ══ VISTA SEMANA ══ -->
  <div class="cal-semana" *ngIf="vista === 'semana'">
    <div class="semana-header">
      <div class="semana-hora-col"></div>
      <div class="semana-dia-col"
        *ngFor="let dia of diasDaSemana; let i = index"
        [class.hoje]="isHoje(dia)">
        <span class="semana-dia-nome">{{ diasSemana[i] }}</span>
        <span class="semana-dia-num" [class.hoje-num]="isHoje(dia)">{{ dia.getDate() }}</span>
      </div>
    </div>
    <div class="semana-body">
      <div class="semana-linha" *ngFor="let hora of horas">
        <div class="semana-hora-label">{{ hora }}</div>
        <div class="semana-celula"
          *ngFor="let dia of diasDaSemana"
          [class.hoje-col]="isHoje(dia)"
          [class.passado-col]="isPassado(dia)"
          (click)="!isPassado(dia) && abrirModalNovoEvento(dia)">
          <ng-container *ngIf="eventoNaHora(dia, hora) as ev">
            <div class="semana-evento" [ngClass]="'cor-' + ev.cor"
              (click)="abrirModalEditar(ev, $event)">
              {{ ev.titulo }}
            </div>
          </ng-container>
        </div>
      </div>
    </div>
  </div>

  <!-- ══ VISTA DIA ══ -->
  <div class="cal-dia" *ngIf="vista === 'dia'">
    <div class="dia-linha"
      *ngFor="let hora of horas"
      [class.passado-col]="isPassado(dataAtual)"
      (click)="!isPassado(dataAtual) && abrirModalNovoEvento(dataAtual)">
      <div class="dia-hora-label">{{ hora }}</div>
      <div class="dia-celula">
        <ng-container *ngIf="eventoNaHora(dataAtual, hora) as ev">
          <div class="dia-evento" [ngClass]="'cor-' + ev.cor"
            (click)="abrirModalEditar(ev, $event)">
            <span class="dia-evento-hora">{{ ev.hora }}</span>
            <span class="dia-evento-titulo">{{ ev.titulo }}</span>
          </div>
        </ng-container>
      </div>
    </div>
  </div>

  <div class="bottom-space"></div>

</ion-content>
