<ion-header class="ion-no-border">
  <ion-toolbar color="dark">
    <ion-title>Calendário</ion-title>
    <ion-buttons slot="end">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="cal-content" [fullscreen]="true">
  <div class="data-header">
    <div class="data-principal">
      <h1 class="dia-num">{{ dataAtual | date:'dd' }}</h1>
      <h2 class="mes-nome">{{ dataAtual | date:'MMMM' | titlecase }}</h2>
      <h3 class="ano-num">2026</h3>
    </div>
    <div class="dia-semana-txt">
      {{ dataAtual | date:'EEE' | uppercase }}
    </div>
  </div>

  <div class="vista-bar">
    <button class="vista-btn" [class.active]="vista === 'mes'" (click)="setVista('mes')">MÊS</button>
    <button class="vista-btn" [class.active]="vista === 'semana'" (click)="setVista('semana')">SEMANA</button>
    <button class="vista-btn" [class.active]="vista === 'dia'" (click)="setVista('dia')">DIA</button>
  </div>

  <div class="cal-mes" *ngIf="vista === 'mes'">
    <div class="mes-header">
      <div class="mes-header-dia" *ngFor="let d of diasSemana">{{ d | uppercase }}</div>
    </div>
    
    <div class="mes-grid">
      <div class="mes-celula" *ngFor="let celula of celulas"
        [class.outro-mes]="!celula.mesAtual"
        [class.hoje]="isHoje(celula.data)"
        [class.passado]="isPassado(celula.data) && celula.mesAtual"
        [class.futuro]="!isPassado(celula.data) && !isHoje(celula.data) && celula.mesAtual"
        [class.selecionado]="mesmoDia(celula.data, dataAtual) && !isHoje(celula.data)"
        (click)="dataAtual = celula.data">
        
        <span class="celula-num">{{ celula.data.getDate() }}</span>
      </div>
    </div>
  </div>

  <div class="nav-footer">
    <button class="nav-btn" (click)="anterior()">
      <ion-icon name="chevron-back-outline"></ion-icon>
    </button>
    <button class="nav-btn" (click)="proximo()">
      <ion-icon name="chevron-forward-outline"></ion-icon>
    </button>
  </div>
</ion-content>
