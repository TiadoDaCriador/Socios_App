<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-buttons slot="end">
      <ion-menu-button></ion-menu-button>
    </ion-buttons>
    <ion-title>{{ 'DEFINICOES.TITULO' | translate }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="def-content">
  <div class="def-layout">

    <div class="logo-sidebar">
      <span class="sidebar-texto">maestro</span>
      <img src="assets/images/image-2.png" alt="Logo" class="logo-img" />
    </div>

    <div class="opcoes-lista">
      <ng-container *ngFor="let op of opcoes; let i = index">

        <div class="opcao-row" [class.danger]="op.danger" [class.expanded]="opcaoAberta === op.id"
          [style.background]="op.danger ? '#111111' : getCinzento(i)" (click)="clicar(op)">
          <span class="opcao-label" [class.danger-label]="op.danger">
            {{ op.labelKey | translate }}
          </span>
          <ion-icon *ngIf="!op.danger"
            [name]="opcaoAberta === op.id ? 'chevron-down-outline' : 'chevron-forward-outline'" class="chevron">
          </ion-icon>
          <ion-icon *ngIf="op.danger" name="exit-outline" class="danger-chevron">
          </ion-icon>
        </div>

        <div class="dropdown-panel" *ngIf="opcaoAberta === op.id && op.id === 'acessibilidade'">
          <app-acessibilidade-modal></app-acessibilidade-modal>
        </div>

        <div class="dropdown-panel" *ngIf="opcaoAberta === op.id && op.id === 'notificacoes'">
          <app-notificacoes-modal></app-notificacoes-modal>
        </div>

        <div class="dropdown-panel" *ngIf="opcaoAberta === op.id && op.id === 'password'">
          <app-password-modal></app-password-modal>
        </div>

        <div class="dropdown-panel" *ngIf="opcaoAberta === op.id && op.id === 'cartoes'">
          <app-cartoes-modal></app-cartoes-modal>
        </div>

        <div class="dropdown-panel" *ngIf="opcaoAberta === op.id && op.id === 'suporte'">
          <app-suporte-modal></app-suporte-modal>
        </div>

        <div class="dropdown-panel" *ngIf="opcaoAberta === op.id && op.id === 'termos'">
          <app-termos-modal></app-termos-modal>
        </div>

      </ng-container>
    </div>

  </div>
</ion-content>
