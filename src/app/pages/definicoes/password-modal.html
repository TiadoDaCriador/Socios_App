<div class="modal-body">

    <div class="setting-block">
        <div class="setting-left">
            <div class="setting-info">
                <span class="setting-label">{{ 'PASSWORD.CURRENT' | translate }}</span>
            </div>
        </div>
        <div class="input-wrapper">
            <input class="password-input" type="password" [(ngModel)]="passwordAtual" placeholder="••••••••" />
        </div>
    </div>

    <div class="setting-block">
        <div class="setting-left">
            <div class="setting-info">
                <span class="setting-label">{{ 'PASSWORD.NEW' | translate }}</span>
            </div>
        </div>
        <div class="input-wrapper">
            <input class="password-input" type="password" [(ngModel)]="passwordNova" placeholder="••••••••" />
        </div>
    </div>

    <div class="setting-block">
        <div class="setting-left">
            <div class="setting-info">
                <span class="setting-label">{{ 'PASSWORD.CONFIRM' | translate }}</span>
            </div>
        </div>
        <div class="input-wrapper">
            <input class="password-input" type="password" [(ngModel)]="passwordConfirm" placeholder="••••••••" />
        </div>
    </div>

    <div class="erro-msg" *ngIf="erroMsg">
        <span>{{ erroMsg }}</span>
    </div>

    <button class="btn-guardar" (click)="guardar()">
        {{ 'COMUM.GUARDAR' | translate }}
    </button>

</div>
