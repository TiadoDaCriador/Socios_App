<ion-header>
  <ion-toolbar class="modal-toolbar">
    <ion-title>{{ 'TERMOS.TITULO' | translate }}</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="fechar()" fill="clear">
        <ion-icon name="close-outline" style="font-size:22px;color:#6b7280"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>
<ion-content class="modal-content">
  <div class="modal-body termos-body">
    <ion-icon name="document-text-outline" class="termos-icon"></ion-icon>
    <h2 class="termos-titulo">{{ 'TERMOS.SUBTITULO' | translate }}</h2>
    <p class="termos-texto">{{ 'TERMOS.TEXTO1' | translate }}</p>
    <p class="termos-texto">{{ 'TERMOS.TEXTO2' | translate }}</p>
    <button class="btn-guardar" (click)="fechar()">{{ 'TERMOS.FECHAR' | translate }}</button>
  </div>
</ion-content>
