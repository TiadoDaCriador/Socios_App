<div class="modal-body">

  <div class="setting-row">
    <div class="setting-left">
      <div class="setting-icon">
        <ion-icon name="document-text-outline"></ion-icon>
      </div>
      <div class="setting-info">
        <span class="setting-label">{{ 'DEFINICOES.TERMOS' | translate }}</span>
        <span class="setting-desc">{{ 'TERMOS.VERSAO' | translate }}</span>
      </div>
    </div>
  </div>

  <div class="termos-info">
    <ion-icon name="information-circle-outline"></ion-icon>
    <p>{{ 'TERMOS.DESC' | translate }}</p>
  </div>

  <button class="btn-guardar btn-termos" (click)="abrirTermos()">
    <ion-icon name="open-outline"></ion-icon>
    {{ 'TERMOS.VER' | translate }}
  </button>

</div>
